<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
<title id="title">LLMgram intelligence architecture</title><desc id="desc">Pipeline from source ingestion to AI triage, editorial ranking, publication and knowledge base.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05070b"/><stop offset="1" stop-color="#0d1728"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#00d9ff"/></marker><style>.title{font:900 44px Inter,Arial,sans-serif;fill:#f8fbff}.sub{font:500 19px Inter,Arial,sans-serif;fill:#9fb1c6}.box{fill:#0b1018;stroke:#223247;stroke-width:1.5;rx:22}.box2{fill:#10130c;stroke:#725f13;stroke-width:1.5;rx:22}.label{font:900 22px Inter,Arial,sans-serif;fill:#f8fbff}.tiny{font:800 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#8ea4bb;text-transform:uppercase;letter-spacing:1.5px}.small{font:500 15px Inter,Arial,sans-serif;fill:#c5d2e1}.cyan{fill:#00d9ff}.yellow{fill:#f8d348}.green{fill:#00ff9d}.arrow{stroke:#00d9ff;stroke-width:3;fill:none;marker-end:url(#arrow)}.loop{stroke:#f8d348;stroke-width:2.5;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}</style></defs>
<rect width="1400" height="860" fill="url(#bg)"/><circle cx="1180" cy="130" r="260" fill="#00d9ff" opacity=".07"/><circle cx="200" cy="710" r="230" fill="#f8d348" opacity=".07"/>
<text x="70" y="82" class="title">LLMgram — AI Signal Intelligence Stack</text><text x="72" y="118" class="sub">From noisy streams to source-grounded weekly signal, APIs and knowledge bases.</text>
<g transform="translate(60 185)"><rect class="box" width="245" height="420"/><text x="28" y="48" class="tiny">01 · ingest</text><text x="28" y="84" class="label">Sources</text><text x="28" y="130" class="small">• social/X lists</text><text x="28" y="168" class="small">• GitHub repos/PRs</text><text x="28" y="206" class="small">• papers & labs</text><text x="28" y="244" class="small">• product releases</text><text x="28" y="282" class="small">• manual URLs</text><text x="28" y="340" class="small">Freshness, dedupe and provenance start here.</text></g>
<path class="arrow" d="M320 395 C355 395 365 395 400 395"/>
<g transform="translate(400 185)"><rect class="box" width="260" height="420"/><text x="28" y="48" class="tiny">02 · triage</text><text x="28" y="84" class="label">AI Triage</text><text x="28" y="130" class="small">• relevance classifier</text><text x="28" y="168" class="small">• novelty score</text><text x="28" y="206" class="small">• builder value</text><text x="28" y="244" class="small">• safety/risk flags</text><text x="28" y="282" class="small">• category routing</text><text x="28" y="340" class="small">Models propose; humans keep control.</text></g>
<path class="arrow" d="M675 395 C710 395 720 395 755 395"/>
<g transform="translate(755 145)"><rect class="box2" width="290" height="500"/><text x="28" y="48" class="tiny">03 · rank</text><text x="28" y="84" class="label">Editorial Core</text><rect x="28" y="124" width="234" height="74" rx="18" fill="#0b1018" stroke="#3a4657"/><text x="50" y="154" class="small">Signal scoring</text><text x="50" y="178" class="small">score · confidence · impact</text><rect x="28" y="220" width="234" height="74" rx="18" fill="#0b1018" stroke="#3a4657"/><text x="50" y="250" class="small">Human review</text><text x="50" y="274" class="small">reject hype · approve claims</text><rect x="28" y="316" width="234" height="74" rx="18" fill="#0b1018" stroke="#3a4657"/><text x="50" y="346" class="small">Weekly synthesis</text><text x="50" y="370" class="small">briefs · radars · feeds</text></g>
<path class="arrow" d="M1060 395 C1095 395 1105 395 1140 395"/>
<g transform="translate(1140 185)"><rect class="box" width="220" height="420"/><text x="24" y="48" class="tiny">04 · ship</text><text x="24" y="84" class="label">Publishing</text><text x="24" y="130" class="small">• website</text><text x="24" y="168" class="small">• RSS/JSON APIs</text><text x="24" y="206" class="small">• weekly digest</text><text x="24" y="244" class="small">• company radars</text><text x="24" y="282" class="small">• knowledge base</text><text x="24" y="340" class="small">Fast public outputs, private workflow behind.</text></g>
<g transform="translate(210 700)"><rect class="box" width="270" height="95"/><circle cx="40" cy="38" r="12" class="green"/><text x="68" y="44" class="label">Automation</text><text x="26" y="74" class="small">collectors · cron · queues</text></g>
<g transform="translate(570 700)"><rect class="box" width="270" height="95"/><circle cx="40" cy="38" r="12" class="cyan"/><text x="68" y="44" class="label">API Contract</text><text x="26" y="74" class="small">OpenAPI · bounded endpoints</text></g>
<g transform="translate(930 700)"><rect class="box" width="270" height="95"/><circle cx="40" cy="38" r="12" class="yellow"/><text x="68" y="44" class="label">Knowledge</text><text x="26" y="74" class="small">wiki · memory · archives</text></g>
<path class="loop" d="M346 700 C370 610 455 570 520 605"/><path class="loop" d="M705 700 C740 640 765 620 825 645"/><path class="loop" d="M1065 700 C1140 640 1220 610 1240 605"/>
</svg>
