<line x1="90" x2="1310" y1="92" y2="92" class="line"/>
<g transform="translate(90 145)"><circle cx="7" cy="7" r="5" fill="#00ff9d"/><text x="25" y="12" class="mono cyan" font-size="14" font-weight="900" letter-spacing="5">LIVE SIGNAL</text><text x="178" y="12" class="mono muted" font-size="13" letter-spacing="4">— REFRESHED EVERY 2H</text><text x="1110" y="12" class="mono muted" font-size="13" letter-spacing="4">JUN · 2026</text></g>
