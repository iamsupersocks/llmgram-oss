<g transform="translate(320 670)"><rect class="panelY" width="760" height="125"/><text x="28" y="38" class="mono yellow" font-size="13" font-weight="900" letter-spacing="4">WEEKLY NEWS</text><text x="28" y="79" class="mono white" font-size="33" font-weight="900">The LLM week, compressed into one readable brief.</text><text x="28" y="107" class="sans muted" font-size="16">Source ingest → AI triage → editorial ranking → weekly signal.</text></g>
