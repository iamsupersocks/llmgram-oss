<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
<title id="title">LLMgram OSS preview</title><desc id="desc">Dark cyberpunk preview of the LLMgram signal dashboard.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05070b"/><stop offset="1" stop-color="#0b1220"/></linearGradient><style>.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.sans{font-family:Inter,Arial,sans-serif}.muted{fill:#91a4b8}.cyan{fill:#00d9ff}.yellow{fill:#f8d348}.white{fill:#f8fbff}.line{stroke:#1e2a38;stroke-width:1}.panel{fill:#091018;stroke:#1d2c3c;stroke-width:1.5}.panelY{fill:#121109;stroke:#8a7214;stroke-width:1.5}.panelC{fill:#07121b;stroke:#006f85;stroke-width:1.5}</style></defs>
